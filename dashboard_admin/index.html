<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard - Administrator</title>

        <link rel="stylesheet" href="styles/main.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <aside class="sidebar sidebar-switch">
            <button class="close-sidebar">
                    <i class="bi bi-x-lg"></i>
            </button>
            
            <div class="header-sidebar">
                <h2>School Assistence System</h2>
            </div>

            <div class="main-sidebar">
                <a href=""
                    ><i class="bi bi-ui-radios-grid"></i>
                    <span>Panel de control</span></a
                >

                <a href=""
                    ><i class="bi bi-clipboard-data-fill"></i>
                    <span>Analiticas</span></a
                >

                <a href=""
                    ><i class="bi bi-archive-fill"></i>
                    <span>Registros</span></a
                >

                <a href=""
                    ><i class="bi bi-file-earmark-person-fill"></i>
                    <span>Estudiantes</span></a
                >

                <a href=""
                    ><i class="bi bi-flag-fill"></i> <span>Reportes</span></a
                >

                <a href=""
                    ><i class="bi bi-gear-fill"></i>
                    <span>Configuraciones</span></a
                >
            </div>
        </aside>

        <aside class="open-sidebar ">
            <button class="button-open-sidebar"></button>
        </aside>

        <main class="wrapper dashboard visible">
            <section class="header-dashboard">
                <article class="header-sect-dash">
                    <div class="icons-dashboard-header icon-total-registers">
                        <i class="bi bi-file-earmark-person-fill"></i>
                    </div>
                    <h3>Registros Totales</h3>
                </article>

                <article class="header-sect-dash">
                    <div class="icons-dashboard-header icon-today-assistence">
                        <i class="bi bi-file-bar-graph-fill"></i>
                    </div>
                    <h3>Asistencia</h3>
                </article>

                <article class="header-sect-dash">
                    <div class="icons-dashboard-header icon-entries">
                        <i class="bi bi-file-arrow-up-fill"></i>
                    </div>
                    <h3>Entradas</h3>
                </article>

                <article class="header-sect-dash">
                    <div class="icons-dashboard-header icon-exits">
                        <i class="bi bi-file-arrow-down-fill"></i>
                    </div>
                    <h3>Salidas</h3>
                </article>
            </section>
        </main>

        <script src="script.js"></script>

    </body>
</html>
