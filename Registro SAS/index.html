<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="style.css" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <nav>
            <img src="assets/Logo 2000x2000.png" alt="logo" width="50px">

            <div class="nav-links">
                <a href="../Prototipo SAS/index.html">Inicio</a>
                <a href="">Funciones</a>
                <a href="">Contacto</a>
            </div>
        </nav>

        <main class="container">
            <section class="box-register">
                <h2>Registrarse</h2>
                <form action="#" id="register-form">
                    <label for="username"></label>
                    <input type="text" id="username" placeholder="Nombre de Usuario" />

                    <div class="input-email">
                        <label for="email"></label>
                        <input type="text" id="email" />

                        <select name="domain-email" id="domain">
                            <option value="">alumnos.sip.cl</option>
                        </select>
                    </div>

                    <label for="password"></label>
                    <input type="password" id="password" placeholder="Contraseña"/>

                    <label for="confirm-password"></label>
                    <input type="password" id="confirm-password" placeholder="Confirmar Contraseña" />

                    <div class="input-submit">
                    <input type="submit" />
                    </div>
                </form>
                
                <a href="" id="already-have-account">¿Ya tienes una cuenta?</a>
            </section>
        </main>
    </body>
</html>
