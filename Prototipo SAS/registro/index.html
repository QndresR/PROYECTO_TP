<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="css-register/main.css" />
        <title>Registrarse</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <nav>
                <div id="logo-nav">
                    <img src="assets/img/Logo 2000x2000.png" alt="Logo School Assistence System" />
                </div>

                <div id="links-nav">
                    <a href="../index.html">Inicio</a>
                    <a href="">Funciones</a>
                    <a href="">Contacto</a>
                </div>
            </nav>
        </header>
        <main>
                <h1>Registrate</h1>
                
            <section>
                <form action="#">
                    <div class="input-container input-email">
                        <label for="user">Correo Electronico</label>
                        <input type="text" id="user" />

                        <span>@</span>

                        <label for="domain"></label>
                        <select name="" id="domain">
                            <option value="SIP Red De Colegios">alumnos.sip.cl</option>
                        </select>
                    </div>

                    <div class="input-container input-password">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" />
                    </div>

                    <div class="input-container input-submit">
                        <input type="submit" />
                    </div>
                </form>
            </section>
        </main>
    </body>
</html>
